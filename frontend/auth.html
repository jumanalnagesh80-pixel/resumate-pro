<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — ResuMate AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-aurora min-h-screen flex items-center justify-center p-4">

<div x-data="authPage" x-init="init()" x-cloak class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-6">
    <a href="/" class="inline-flex items-center gap-3">
      <div class="w-11 h-11 rounded-2xl flex items-center justify-center shadow-lg"
           style="background:linear-gradient(135deg,var(--brand-1),var(--brand-3))">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 3h-7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/>
          <path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/>
        </svg>
      </div>
      <span class="text-white text-xl font-bold">ResuMate AI</span>
    </a>
  </div>

  <!-- Card -->
  <div class="glass p-8 rounded-3xl shadow-2xl">
    <!-- Tabs -->
    <div class="flex gap-1 mb-7 p-1 rounded-xl" style="background:rgba(255,255,255,.1)">
      <button @click="mode='login'"
              :class="mode==='login'?'bg-white text-slate-900 shadow':'text-white/70 hover:text-white'"
              class="flex-1 py-2 rounded-lg font-semibold text-sm transition-all">Sign in</button>
      <button @click="mode='register'"
              :class="mode==='register'?'bg-white text-slate-900 shadow':'text-white/70 hover:text-white'"
              class="flex-1 py-2 rounded-lg font-semibold text-sm transition-all">Create account</button>
    </div>

    <h2 class="text-white text-2xl font-bold mb-1" x-text="mode==='login'?'Welcome back':'Get started free'"></h2>
    <p class="text-white/60 text-sm mb-6" x-text="mode==='login'?'Resume where you left off.':'No credit card. No nonsense.'"></p>

    <form @submit.prevent="submit()" class="space-y-4">
      <div x-show="mode==='register'" x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
        <label class="label" style="color:rgba(255,255,255,.7)">Full name</label>
        <input type="text" class="field" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:white"
               x-model="form.name" placeholder="Your name" autocomplete="name">
      </div>
      <div>
        <label class="label" style="color:rgba(255,255,255,.7)">Email address</label>
        <input type="email" class="field" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:white"
               x-model="form.email" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div>
        <label class="label" style="color:rgba(255,255,255,.7)">Password</label>
        <input type="password" class="field" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:white"
               x-model="form.password" required minlength="6"
               :placeholder="mode==='register'?'At least 6 characters':'••••••••'"
               autocomplete="current-password">
      </div>

      <!-- Error -->
      <div x-show="error" x-transition class="text-sm text-red-200 bg-red-500/20 border border-red-400/30 rounded-xl px-4 py-3" x-text="error"></div>

      <button type="submit" class="btn-brand w-full mt-2 justify-center py-3 text-base" :disabled="busy">
        <span x-show="!busy" x-text="mode==='login'?'Sign in →':'Create my account →'"></span>
        <span x-show="busy" class="flex items-center justify-center gap-2">
          <span class="spinner"></span> Please wait…
        </span>
      </button>
    </form>

    <p class="text-white/40 text-xs text-center mt-6">
      By continuing, you agree this is a demo — please don't store sensitive data.
    </p>
  </div>

  <p class="text-center text-white/50 text-xs mt-4">
    <a href="/" class="hover:text-white transition">← Back to home</a>
  </p>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
